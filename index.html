<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PED Roster</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="PED Roster">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff7ec">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: #fff7ec;
      color: #082f72;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .launch {
      width: min(100%, 360px);
    }

    .launch img {
      width: 132px;
      height: 132px;
      border-radius: 28px;
      box-shadow: 0 16px 36px rgba(20, 61, 120, 0.18);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: #475966;
      font-size: 16px;
      line-height: 1.45;
    }

    .countdown {
      font-weight: 800;
      color: #082f72;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(8, 47, 114, 0.12);
      border-radius: 8px;
      padding: 12px 16px;
      background: #0b45a0;
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(20, 61, 120, 0.2);
    }

    .skip-button {
      background: #ffffff;
      color: #0b45a0;
      box-shadow: none;
    }

    .install-help {
      min-height: 42px;
      margin: 14px 0 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section class="launch">
      <img src="icon-180.png" alt="PED Roster icon">
      <h1>PED Roster</h1>
      <p id="redirectStatus" aria-live="polite">Opening the roster in <span id="countdown" class="countdown">3</span> seconds...</p>
      <div class="actions">
        <button id="installButton" class="action-button" type="button">Add to Home Screen</button>
        <a id="skipButton" class="action-button skip-button" href="https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec">Skip countdown</a>
      </div>
      <p id="installHelp" class="install-help" aria-live="polite"></p>
    </section>
  </main>
  <script>
    var rosterUrl = 'https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec';
    var deferredInstallPrompt = null;
    var redirectTimer = null;
    var countdownTimer = null;
    var countdownValue = 3;

    function openRoster() {
      window.location.replace(rosterUrl);
    }

    function stopCountdown(message) {
      window.clearTimeout(redirectTimer);
      window.clearInterval(countdownTimer);
      redirectTimer = null;
      countdownTimer = null;
      if (message) document.getElementById('redirectStatus').textContent = message;
    }

    function startCountdown() {
      document.getElementById('countdown').textContent = String(countdownValue);
      countdownTimer = window.setInterval(function() {
        countdownValue -= 1;
        if (countdownValue > 0) {
          document.getElementById('countdown').textContent = String(countdownValue);
        } else {
          window.clearInterval(countdownTimer);
        }
      }, 1000);
      redirectTimer = window.setTimeout(openRoster, 3000);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }

    window.addEventListener('beforeinstallprompt', function(event) {
      event.preventDefault();
      deferredInstallPrompt = event;
    });

    window.addEventListener('appinstalled', function() {
      deferredInstallPrompt = null;
      document.getElementById('installHelp').textContent = 'PED Roster was added to your home screen.';
    });

    document.getElementById('installButton').addEventListener('click', function() {
      var installHelp = document.getElementById('installHelp');
      stopCountdown('Automatic opening paused.');

      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.then(function() {
          deferredInstallPrompt = null;
          installHelp.textContent = 'You can now open the roster, or use the new home-screen icon if installed.';
        });
        return;
      }

      var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
      installHelp.textContent = isIos
        ? 'On iPhone or iPad: tap Share, then choose Add to Home Screen.'
        : 'Open your browser menu and choose Install app or Add to Home screen.';
    });

    startCountdown();
  </script>
</body>
</html>
