<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PED Roster</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="PED Roster">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff7ec">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: #fff7ec;
      color: #082f72;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .launch {
      width: min(100%, 360px);
    }

    .launch img {
      width: 132px;
      height: 132px;
      border-radius: 28px;
      box-shadow: 0 16px 36px rgba(20, 61, 120, 0.18);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: #475966;
      font-size: 16px;
      line-height: 1.45;
    }

    .countdown-text {
      margin: 12px 0 18px;
      color: #0b45a0;
      font-size: 14px;
      font-weight: 600;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .open-button,
    .skip-button,
    .share-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(8, 47, 114, 0.12);
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .open-button {
      background: #0b45a0;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(20, 61, 120, 0.2);
    }

    .open-button:hover {
      background: #0a3a7f;
      box-shadow: 0 10px 24px rgba(20, 61, 120, 0.3);
    }

    .skip-button {
      background: #ffffff;
      color: #0b45a0;
      border: 2px solid #0b45a0;
      box-shadow: none;
    }

    .skip-button:hover {
      background: #f0f5ff;
    }

    .skip-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ffffff;
    }

    .share-button {
      background: #4CAF50;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(76, 175, 80, 0.2);
    }

    .share-button:hover {
      background: #45a049;
      box-shadow: 0 10px 24px rgba(76, 175, 80, 0.3);
    }

    .share-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #4CAF50;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <section class="launch">
      <img src="icon-180.png" alt="PED Roster icon">
      <h1>PED Roster</h1>
      <p>Opening the roster...</p>
      <div class="countdown-text">
        Redirecting in <span id="countdown">5</span> seconds
      </div>
      <div class="button-group">
        <a id="openRoster" class="open-button" href="https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec">Open roster</a>
        <button id="skipButton" class="skip-button">Skip (5s)</button>
        <button id="shareButton" class="share-button hidden">📱 Share to Homescreen</button>
      </div>
    </section>
  </main>
  <script>
    var rosterUrl = 'https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec';
    var countdownSeconds = 5;
    var countdownInterval;
    var deferredPrompt;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }

    // Handle the beforeinstallprompt event
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('shareButton').classList.remove('hidden');
    });

    // Share to Homescreen button
    document.getElementById('shareButton').addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the install prompt');
          } else {
            console.log('User dismissed the install prompt');
          }
          deferredPrompt = null;
        });
      }
    });

    // Skip button
    document.getElementById('skipButton').addEventListener('click', function() {
      clearInterval(countdownInterval);
      window.location.replace(rosterUrl);
    });

    // Countdown timer
    function updateCountdown() {
      countdownSeconds--;
      document.getElementById('countdown').textContent = countdownSeconds;
      document.getElementById('skipButton').textContent = 'Skip (' + countdownSeconds + 's)';

      if (countdownSeconds <= 0) {
        clearInterval(countdownInterval);
        window.location.replace(rosterUrl);
      }
    }

    countdownInterval = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
