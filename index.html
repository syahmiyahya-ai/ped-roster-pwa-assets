<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PED Roster</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="PED Roster">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff7ec">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: #fff7ec;
      color: #082f72;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100vh;
      border: 0;
      background: #fff7ec;
    }

    .fallback {
      position: fixed;
      inset: auto 16px 16px;
      display: none;
      border: 1px solid rgba(8, 47, 114, 0.12);
      border-radius: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 24px rgba(20, 61, 120, 0.14);
    }

    .fallback a {
      color: #0b45a0;
      font-weight: 800;
    }

    .fallback.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="rosterFrame"
    class="app-frame"
    title="PED Roster"
    src="https://script.google.com/macros/s/AKfycbx0IRkIKSqQjO7_N3T0xeORB9Lj4yUeVqCZE05xtCvGGG2gpZp64mL4iPRk4NI00sRDVA/exec"
    allow="fullscreen"
  ></iframe>
  <div id="fallback" class="fallback">
    If the roster does not appear, <a href="https://script.google.com/macros/s/AKfycbx0IRkIKSqQjO7_N3T0xeORB9Lj4yUeVqCZE05xtCvGGG2gpZp64mL4iPRk4NI00sRDVA/exec">open it directly</a>.
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }

    window.setTimeout(function() {
      document.getElementById('fallback').classList.add('is-visible');
    }, 5000);
  </script>
</body>
</html>
