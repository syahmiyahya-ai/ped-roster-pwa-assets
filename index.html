<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PED Roster</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="PED Roster">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff7ec">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: #fff7ec;
      color: #082f72;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .launch {
      width: min(100%, 360px);
    }

    .launch img {
      width: 132px;
      height: 132px;
      border-radius: 28px;
      box-shadow: 0 16px 36px rgba(20, 61, 120, 0.18);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: #475966;
      font-size: 16px;
      line-height: 1.45;
    }

    .open-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(8, 47, 114, 0.12);
      border-radius: 8px;
      padding: 12px 16px;
      background: #0b45a0;
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(20, 61, 120, 0.2);
    }
  </style>
</head>
<body>
  <main>
    <section class="launch">
      <img src="icon-180.png" alt="PED Roster icon">
      <h1>PED Roster</h1>
      <p>Opening the roster...</p>
      <a id="openRoster" class="open-button" href="https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec">Open roster</a>
    </section>
  </main>
  <script>
    var rosterUrl = 'https://script.google.com/macros/s/AKfycbzZFTKAzSIpED--f5LjQBp6rrvn61OBfhhymaF3n45Gdyt8CdRyQN6S4GOAm5PYL4PLwQ/exec';

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }

    window.setTimeout(function() {
      window.location.replace(rosterUrl);
    }, 600);
  </script>
</body>
</html>
